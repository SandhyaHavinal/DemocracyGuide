<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process Timeline - DemocracyGuide</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="styles.css?v=6">
</head>
<body>
    <div class="background-elements">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <nav class="global-nav">
        <a href="index.html" class="nav-logo">
            <i class='bx bxs-institution'></i>
            <span>DemocracyGuide</span>
        </a>
        <div class="nav-links">
            <a href="index.html" data-i18n="nav_home">Home</a>
            <a href="timeline.html" class="active" data-i18n="nav_timeline">Process Timeline</a>
            <a href="resources.html" data-i18n="nav_resources">Resources</a>
        </div>
    </nav>

    <main class="app-container">
        <section class="assistant-interface">
            <nav class="timeline-nav" id="timelineNav"></nav>
            <div class="content-panel glass-panel">
                <div class="step-content" id="stepContent"></div>
                <div class="controls">
                    <button id="prevBtn" class="btn btn-secondary" disabled>
                        <i class='bx bx-left-arrow-alt'></i> <span data-i18n="btn_prev">Previous</span>
                    </button>
                    <button id="nextBtn" class="btn btn-primary">
                        <span data-i18n="btn_next">Next Step</span> <i class='bx bx-right-arrow-alt'></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- Chat Assistant Floating Button -->
        <div class="chat-fab" id="chatFab" tabindex="0" role="button" aria-label="Open Chat Assistant"><i class='bx bx-bot'></i></div>
        <!-- Mini Chat Window -->
        <div class="chat-window hidden" id="chatWindow">
            <div class="chat-header">
                <h3><i class='bx bx-bot'></i> Election Bot</h3>
                <button id="closeChatBtn" class="icon-btn"><i class='bx bx-x'></i></button>
            </div>
            <div class="chat-body" id="chatBody" aria-live="polite">
                <div class="chat-message bot"><p data-i18n="chat_welcome_timeline">I'm your timeline assistant! Need help with the current step?</p></div>
            </div>
            <div class="chat-footer">
                <input type="text" id="chatInput" data-i18n-placeholder="chat_placeholder" placeholder="Ask a question...">
                <button id="sendChatBtn" class="icon-btn"><i class='bx bx-send'></i></button>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <script src="translations.js?v=6"></script>
    <script src="i18n.js?v=6"></script>
    <script src="global.js?v=6"></script>
    <script src="timeline.js?v=6"></script>
</body>
</html>
